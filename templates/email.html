<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="margin:0;padding:0;background-color:#f4f4f4;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f4;">
<tr><td align="center" style="padding:20px 0;">

<table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:8px;overflow:hidden;">

  <!-- Header -->
  <tr>
    <td style="background-color:#1a1a2e;color:#ffffff;padding:24px 32px;text-align:center;">
      <p style="margin:0;font-size:13px;letter-spacing:2px;text-transform:uppercase;opacity:0.8;">📰 The Eight Words Daily</p>
      <p style="margin:8px 0 0;font-size:14px;opacity:0.6;">{{ date }}</p>
    </td>
  </tr>

  <!-- Headline -->
  <tr>
    <td style="padding:32px 32px 16px;">
      <p style="margin:0 0 4px;font-size:11px;color:#888;text-transform:uppercase;letter-spacing:1px;">Today's Headline</p>
      <h1 style="margin:0;font-size:22px;color:#1a1a1a;line-height:1.4;">{{ title }}</h1>
    </td>
  </tr>

  <!-- Chinese summary -->
  <tr>
    <td style="padding:0 32px 24px;">
      <p style="margin:0;font-size:15px;color:#555;line-height:1.7;">📝 {{ summary_cn }}</p>
    </td>
  </tr>

  <!-- Divider -->
  <tr>
    <td style="padding:0 32px;">
      <hr style="border:none;border-top:1px solid #eee;margin:0;">
    </td>
  </tr>

  <!-- Keywords -->
  <tr>
    <td style="padding:24px 32px;">
      <p style="margin:0 0 16px;font-size:16px;font-weight:bold;color:#1a1a1a;">📖 今日关键词</p>
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
        {% for kw in keywords %}
        <tr>
          <td style="padding:8px 0;border-bottom:1px solid #f0f0f0;">
            <p style="margin:0;font-size:15px;color:#1a1a1a;">
              <strong>{{ loop.index }}. {{ kw.word }}</strong>
              <span style="color:#888;font-size:13px;"> {{ kw.phonetic }} {{ kw.pos }}</span>
            </p>
            <p style="margin:4px 0 0;font-size:14px;color:#555;">{{ kw.definition_cn }}</p>
          </td>
        </tr>
        {% endfor %}
      </table>
    </td>
  </tr>

  <!-- Divider -->
  <tr>
    <td style="padding:0 32px;">
      <hr style="border:none;border-top:1px solid #eee;margin:0;">
    </td>
  </tr>

  <!-- CTA Button -->
  <tr>
    <td style="padding:28px 32px;text-align:center;">
      <a href="{{ article_url }}"
         style="display:inline-block;background-color:#0066CC;color:#ffffff;text-decoration:none;
                padding:14px 32px;border-radius:6px;font-size:15px;font-weight:bold;">
        🔗 阅读全文 + 收听音频
      </a>
      <p style="margin:10px 0 0;font-size:12px;color:#999;">点击跳转到网页端</p>
    </td>
  </tr>

  <!-- Footer -->
  <tr>
    <td style="background-color:#fafafa;padding:20px 32px;text-align:center;border-top:1px solid #eee;">
      <p style="margin:0;font-size:12px;color:#aaa;">
        BBC News · The Eight Words Daily
      </p>
    </td>
  </tr>

</table>

</td></tr>
</table>
</body>
</html>
